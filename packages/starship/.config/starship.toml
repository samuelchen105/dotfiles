"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭── ](rosewater)\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$fill\
$cmd_duration\
$time\
$line_break\
[╰](rosewater)$character"""

add_newline = true
palette = 'catppuccin_mocha'

[fill]
symbol = ' '

[time]
disabled = false
time_format = "%R"
format = '[󱑎 $time]($style)'
style = "light-gray"

[cmd_duration]
format = '[󰔟 $duration |]($style) '
style = "white"

[directory]
format = '[󰉖 $path]($style)'
style = "blue"

[git_branch]
format = '[ | ](white)[$symbol$branch]($style)'
symbol = "󰘬 "
style = "green"
only_attached = true

[git_commit]
format = '[ | 󰜘](white)[$hash$tag]($style)'
style = "green"
only_detached = true

[git_state]
format = ' \([$state( $progress_current/$progress_total)]($style)\)'
style = "red"
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry-pick"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"

[git_status]
format = '$ahead_behind$conflicted$stashed$staged$modified$untracked'
ahead = '[ 󱦲${count}](green)'
behind = '[ 󱦳${count}](green)'
diverged = '[ 󱦲${ahead_count}󱦳${behind_count}](green)'
conflicted = '[ ~${count}](red)'
stashed = '[ *${count}](green)'
staged = '[ +${count}](peach)'
modified = '[ !${count}](peach)'
untracked = '[ ?${count}](sapphire)'

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'

[palettes.catppuccin_mocha]
black = "#151515"
white = "#d0d0d0"
light-gray = "#9399b2"
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
yellow2 = "#ffcc00"
green = "#91d68b"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
